aws:
  # Option A: Long-term IAM credentials
  access_key_id: ${AWS_ACCESS_KEY_ID}
  secret_access_key: ${AWS_SECRET_ACCESS_KEY}
  # Option B: Temporary STS/SSO token (leave blank if using Option A)
  session_token: ${AWS_SESSION_TOKEN}
  # Option C: Bedrock bearer token (leave blank if using Option A or B)
  bearer_token: ${AWS_BEARER_TOKEN_BEDROCK}
  region: ${AWS_REGION}

lark:
  app_id: ${LARK_APP_ID}
  app_secret: ${LARK_APP_SECRET}
  folder_token: ${LARK_FOLDER_TOKEN}
  parent_doc_id: ${LARK_PARENT_DOC_ID}
  # Tenant-specific base URL (e.g. pj4w2l1pwuq.sg.larksuite.com). Defaults to open.larksuite.com
  base_url: ${LARK_BASE_URL}
  # Optional: separate folders for ERD organization
  erd_image_folder: ${LARK_ERD_IMAGE_FOLDER}
  erd_code_folder: ${LARK_ERD_CODE_FOLDER}

repo:
  default_path: ./
  default_branch: main
